<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Processed Data</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <header>
    <h1>Processed Data</h1>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('live_page') }}">Live Data</a></li>
        <li><a href="{{ url_for('alerts_page') }}">Alerts</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <table id="processedTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </main>
  <script>
  async function loadProcessed() {
    const response = await fetch('/api/processed');
    const data = await response.json();
    const table = document.getElementById('processedTable');
    if (!data || data.length === 0) {
      table.innerHTML = '<tr><td>No data available.</td></tr>';
      return;
    }
    const headers = Object.keys(data[0]);
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');
    thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
    tbody.innerHTML = data.map(row => '<tr>' + headers.map(h => `<td>${row[h]}</td>`).join('') + '</tr>').join('');
  }
  loadProcessed();
  </script>
</body>
</html>
