<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Raw Data – {{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    /* Canvas should shrink responsively while preserving aspect ratio */
    #fitsCanvas {
      width: 100%;
      height: auto;
      max-width: 800px;
      border: 1px solid #dee2e6;
      display: block;
      margin: 1rem auto;
    }
    #histogramChart {
      width: 100%;
      max-width: 800px;
      margin: 1rem auto;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Raw Data: {{ title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        {% for item in nav_items %}
        <li><a href="{{ url_for('raw_page', slug=item.slug) }}"{% if item.slug == slug %} class="active"{% endif %}>{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
  </header>
  <main>
    <canvas id="fitsCanvas"></canvas>
    <div id="stats"></div>
    <canvas id="histogramChart"></canvas>
  </main>
  <footer>
    <p>&copy; {{ current_year }} Astrophysics Pipeline</p>
  </footer>
  <script>
  // Fetch and display the FITS image, stats and histogram
  document.addEventListener('DOMContentLoaded', function() {
    const slug = '{{ slug }}';
    // Draw the raw image
    fetch(`/api/raw_data/${slug}`)
      .then(resp => resp.json())
      .then(data => {
        if (data.error) {
          console.error(data.error);
          return;
        }
        const width = data.width;
        const height = data.height;
        const rows = data.data;
        const canvas = document.getElementById('fitsCanvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(width, height);
        let currentRow = 0;
        function drawNextRow() {
          if (currentRow >= height) return;
          const rowData = rows[currentRow];
          for (let col = 0; col < width; col++) {
            const value = rowData[col] || 0;
            const index = (currentRow * width + col) * 4;
            imageData.data[index] = value;
            imageData.data[index + 1] = value;
            imageData.data[index + 2] = value;
            imageData.data[index + 3] = 255;
          }
          ctx.putImageData(imageData, 0, 0);
          currentRow++;
          // Schedule next row after a short delay to simulate streaming
          setTimeout(drawNextRow, 30);
        }
        drawNextRow();
      })
      .catch(err => {
        console.error('Failed to load raw data:', err);
      });

    // Fetch and display stats and histogram
    fetch(`/api/raw_stats/${slug}`)
      .then(resp => resp.json())
      .then(stats => {
        if (stats.error) {
          console.error(stats.error);
          return;
        }
        // Display stats in a list
        const statsDiv = document.getElementById('stats');
        statsDiv.innerHTML = `
          <ul>
            <li>Min: ${stats.min !== null ? stats.min.toFixed(2) : 'N/A'}</li>
            <li>Max: ${stats.max !== null ? stats.max.toFixed(2) : 'N/A'}</li>
            <li>Mean: ${stats.mean !== null ? stats.mean.toFixed(2) : 'N/A'}</li>
            <li>Median: ${stats.median !== null ? stats.median.toFixed(2) : 'N/A'}</li>
            <li>Std Dev: ${stats.std !== null ? stats.std.toFixed(2) : 'N/A'}</li>
          </ul>
        `;
        // Prepare histogram data for Chart.js
        const labels = stats.histogram.map((_, i) => `Bin ${i+1}`);
        const counts = stats.histogram;
        const ctxHist = document.getElementById('histogramChart').getContext('2d');
        new Chart(ctxHist, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Pixel Intensity Histogram',
              data: counts,
              backgroundColor: 'rgba(75, 192, 192, 0.2)',
              borderColor: 'rgba(75, 192, 192, 1)',
              borderWidth: 1
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      })
      .catch(err => {
        console.error('Failed to load raw stats:', err);
      });
  });
  </script>
</body>
</html>
