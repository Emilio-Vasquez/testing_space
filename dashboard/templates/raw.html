<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Raw Data – {{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    #fitsCanvas {
      width: 100%;
      height: auto;
      max-width: 800px;
      border: 1px solid #dee2e6;
      display: block;
      margin: 1rem auto;
    }
    #histogramChart {
      width: 100%;
      max-width: 800px;
      margin: 1rem auto;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Raw Data: {{ title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        {% for item in nav_items %}
        <li><a href="{{ url_for('raw_page', slug=item.slug) }}"{% if item.slug == slug %} class="active"{% endif %}>{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
  </header>
  <main>
    <canvas id="fitsCanvas"></canvas>
    <div id="stats"></div>
    <canvas id="histogramChart"></canvas>
  </main>
  <footer>
    <p>&copy; {{ current_year }} Astrophysics Pipeline</p>
  </footer>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Retrieve the slug for API calls
    const slug = '{{ slug }}';
    const canvas = document.getElementById('fitsCanvas');
    const ctx = canvas.getContext('2d');
    let histogramChart;
    // Accumulate pixel values as rows are drawn
    let pixelAccumulator = [];
    // How many rows to draw before updating stats/histogram
    const updateInterval = 20;

    /**
     * Compute basic statistics and a histogram on an array of numbers.
     * Returns an object with min, max, mean, median, std, and histogram (10 bins).
     */
    function computeStats(values) {
      if (!values || values.length === 0) return null;
      // Copy and sort values for median and min/max
      const sorted = values.slice().sort((a, b) => a - b);
      const n = sorted.length;
      const sum = sorted.reduce((a, b) => a + b, 0);
      const mean = sum / n;
      const median = n % 2 === 0 ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2 : sorted[Math.floor(n / 2)];
      const min = sorted[0];
      const max = sorted[n - 1];
      const variance = sorted.reduce((acc, v) => acc + (v - mean) * (v - mean), 0) / n;
      const std = Math.sqrt(variance);
      // Build histogram
      const bins = new Array(10).fill(0);
      const binWidth = (max - min + 1) / bins.length;
      sorted.forEach(v => {
        const binIndex = Math.min(bins.length - 1, Math.floor((v - min) / binWidth));
        bins[binIndex]++;
      });
      return { min, max, mean, median, std, histogram: bins };
    }

    /**
     * Update the stats display and histogram chart from the current pixel accumulator.
     */
    function updateStatsAndHistogram() {
      const stats = computeStats(pixelAccumulator);
      if (!stats) return;
      // Update stats list
      document.getElementById('stats').innerHTML = `
        <ul>
          <li>Min: ${stats.min.toFixed(2)}</li>
          <li>Max: ${stats.max.toFixed(2)}</li>
          <li>Mean: ${stats.mean.toFixed(2)}</li>
          <li>Median: ${stats.median.toFixed(2)}</li>
          <li>Std Dev: ${stats.std.toFixed(2)}</li>
        </ul>
      `;
      // Update histogram
      const labels = stats.histogram.map((_, i) => 'Bin ' + (i + 1));
      const data = stats.histogram;
      if (!histogramChart) {
        const histCtx = document.getElementById('histogramChart').getContext('2d');
        histogramChart = new Chart(histCtx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Pixel Intensity Histogram',
              data: data,
              backgroundColor: 'rgba(75, 192, 192, 0.2)',
              borderColor: 'rgba(75, 192, 192, 1)',
              borderWidth: 1
            }]
          },
          options: { scales: { y: { beginAtZero: true } } }
        });
      } else {
        histogramChart.data.labels = labels;
        histogramChart.data.datasets[0].data = data;
        histogramChart.update();
      }
    }

    /**
     * Draw the raw image line by line with a delay between rows.  As rows
     * are drawn, accumulate pixel values and periodically update the
     * statistics and histogram.  This gives a sense of data streaming in
     * real time.
     */
    function drawImage() {
      fetch(`/api/raw_data/${slug}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            console.error(data.error);
            return;
          }
          const width = data.width;
          const height = data.height;
          const rows = data.data;
          canvas.width = width;
          canvas.height = height;
          const imageData = ctx.createImageData(width, height);
          let currentRow = 0;
          function drawNextRow() {
            if (currentRow >= height) {
              // Final update once all rows are drawn
              updateStatsAndHistogram();
              return;
            }
            const rowData = rows[currentRow];
            // Accumulate pixel values for stats
            pixelAccumulator.push(...rowData);
            for (let col = 0; col < width; col++) {
              const val = rowData[col] || 0;
              const idx = (currentRow * width + col) * 4;
              imageData.data[idx] = val;
              imageData.data[idx + 1] = val;
              imageData.data[idx + 2] = val;
              imageData.data[idx + 3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
            // Update stats/histogram periodically
            if ((currentRow + 1) % updateInterval === 0) {
              updateStatsAndHistogram();
            }
            currentRow++;
            // Slight delay for streaming effect (increase to slow down)
            setTimeout(drawNextRow, 20);
          }
          drawNextRow();
        })
        .catch(err => console.error('raw data error', err));
    }

    // Start streaming the image
    drawImage();
  });
  </script>
</body>
</html>
